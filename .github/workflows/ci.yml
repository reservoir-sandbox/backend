name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: backend
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # --- JOB 1: Lint, Type Check and Run Tests (100% from your original code) ---
  lint-test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Check formatting
        run: poetry run black --check .

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run Mypy
        run: poetry run mypy app

      - name: Run tests
        run: poetry run pytest

  # --- JOB 2: Build, Push and Smart GitOps Deploy (The Mixed & Fixed Step) ---
  build-and-push-docker:
    needs: lint-test
    # We only want to deploy to production/GitOps when pushing to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
      packages: write

    steps:
      # Step 1: Checkout backend source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for advanced caching capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Extract metadata (Generates clean long commit SHA tag)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=

      # Step 5: Build and push production container utilizing layer caching
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # FIXED: Swapped context from old './backend' to root directory '.' where your code sits
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Checkout the central infrastructure GitOps repository
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops-deployment
          token: ${{ secrets.PAT_TOKEN }}
          path: gitops-deployment

      # Step 7: Inject the freshly compiled image tag into the Flux HelmRelease
      - name: Update image tag in Flux HelmRelease manifest
        run: |
          # Fetch the exact image tag string generated in Step 4
          COMMIT_SHA="${{ steps.meta.outputs.version }}"
          export COMMIT_SHA

          # FIXED: Shifted from Kustomize tool to direct yq manipulation for HelmRelease structures
          MANIFEST_PATH="gitops-deployment/apps/backend/backend-release.yaml"

          if [ -f "$MANIFEST_PATH" ]; then
            yq eval -i '.spec.values.image.tag = strenv(COMMIT_SHA)' "$MANIFEST_PATH"
            echo "✅ Successfully updated image tag to $COMMIT_SHA in $MANIFEST_PATH"
          else
            echo "❌ Error: GitOps manifest not found at $MANIFEST_PATH"
            exit 1
          fi

      # Step 8: Standardize system credentials and push changes to trigger Flux
      - name: Push updated manifest to GitOps repo
        run: |
          git -C gitops-deployment config --global user.name "github-actions[bot]"
          git -C gitops-deployment config --global user.email "github-actions[bot]@users.noreply.github.com"

          git -C gitops-deployment add apps/backend/backend-release.yaml
          if [ -n "$(git -C gitops-deployment status --porcelain)" ]; then
            git -C gitops-deployment commit -m "chore(backend): auto-update image tag to ${{ steps.meta.outputs.version }}"
            git -C gitops-deployment push
          else
            echo "Manifest image tag is already synchronized. Skipping git operations."
          fi
